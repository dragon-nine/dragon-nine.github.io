  // ── 언어 전환 ──
  function switchLang(lang) {
    document.getElementById('en').classList.toggle('visible', lang === 'en');
    document.getElementById('ko').classList.toggle('visible', lang === 'ko');
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    document.getElementById('btn-ko').classList.toggle('active', lang === 'ko');
    document.documentElement.lang = lang;
  }

  // 브라우저 언어 감지 → 자동 선택
  const userLang = (navigator.language || '').toLowerCase();
  switchLang(userLang.startsWith('ko') ? 'ko' : 'en');
</script>
